<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GELVES STATS - VERSIÓN FINAL</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a0a; color: white; margin: 0; padding: 15px; }
        .pantalla { display: none; flex-direction: column; min-height: 100vh; }
        .active { display: flex; }
        .btn { border: none; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; padding: 15px; margin: 5px 0; text-align: center; font-size: 16px; border: 1px solid #333; }
        .btn-primario { background: #3498db; }
        .btn-exito { background: #2ecc71; }
        .btn-peligro { background: #e74c3c; }
        .btn-neutral { background: #333; }
        input, select { background: #222; color: white; border: 1px solid #444; padding: 15px; border-radius: 40px; width: 100%; margin: 8px 0; font-size: 16px; }
        .marcador-box { background: #121212; border-radius: 28px; padding: 20px; margin: 10px 0; border: 1px solid #333; text-align: center; }
        .nombres-marcador { display: flex; justify-content: space-around; font-size: 20px; font-weight: bold; color: #3498db; margin-bottom: 10px; }
        .marcador { font-size: 64px; font-weight: 900; margin: 10px 0; }
        .timer { font-size: 48px; color: #f1c40f; font-family: monospace; background: #000; padding: 10px 20px; border-radius: 60px; display: inline-block; }
        .timeline-container { flex: 1; background: #111; border-radius: 20px; border: 1px solid #222; margin: 10px 0; overflow: hidden; display: flex; flex-direction: column; }
        .timeline-header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #1a1a1a; border-bottom: 1px solid #333; }
        .timeline-scroll { flex: 1; overflow-y: auto; display: flex; min-height: 0; }
        .col { width: 50%; padding: 10px; }
        .col:first-child { border-right: 1px solid #333; }
        .evento { background: #1a1a1a; padding: 8px; margin: 5px; border-radius: 20px; font-size: 12px; display: flex; justify-content: space-between; }
        .evento[data-tipo="GOL"] { border-left: 4px solid #3498db; }
        .evento[data-tipo="AMARILLA"] { border-left: 4px solid #f1c40f; }
        .evento[data-tipo="ROJA"] { border-left: 4px solid #e74c3c; }
        .evento[data-tipo="PENALTI"], .evento[data-tipo="PENALTI CONTRA"] { border-left: 4px solid #9b59b6; }
        .evento[data-tipo="OCASION"] { border-left: 4px solid #e67e22; }
        .evento[data-tipo="CAMBIO"] { border-left: 4px solid #7f8c8d; }
        .evento[data-tipo="CORNER"] { border-left: 4px solid #2ecc71; }
        .grid-controles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; padding: 20px; display: flex; flex-direction: column; justify-content: center; }
        .grid-jugadores { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 20px 0; max-height: 60vh; overflow-y: auto; }
        .dorsal { background: #3498db; color: black; font-weight: bold; padding: 5px 10px; border-radius: 20px; min-width: 40px; text-align: center; display: inline-block; margin-right: 10px; }
        .jugador-item { padding: 15px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 8px 5px; }
        .dorsal-input { width: 70px; background: #222; color: #f1c40f; border: 1px solid #444; border-radius: 20px; padding: 8px; text-align: center; font-weight: bold; }
        .nombre-input { width: 100%; background: #222; color: white; border: 1px solid #444; border-radius: 20px; padding: 8px; }
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background-color: #2ecc71; }
        input:checked + .slider:before { transform: translateX(26px); }
        .filtro-cambios { display: flex; align-items: center; gap: 10px; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        
        /* Resumen ocupa más espacio */
        #pResumen .timeline-container {
            flex: 2;
            min-height: 300px;
        }
        #pResumen .marcador-box {
            flex: 0 auto;
        }

        /* Alineación correcta de checkboxes en once inicial */
        .once-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .once-item {
            display: flex;
            align-items: center;
            background: #1a1a1a;
            padding: 12px 15px;
            border-radius: 50px;
            border: 1px solid #333;
        }
        .once-item input[type="checkbox"] {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            transform: scale(1.2);
            accent-color: #3498db;
        }
        .once-item .dorsal {
            min-width: 45px;
            text-align: center;
            margin-right: 15px;
        }
    </style>
</head>
<body>

<!-- Pantalla Configuración -->
<div id="pConfig" class="pantalla active">
    <h2 style="text-align: center; color: #3498db;">⚡ GELVES STATS PRO</h2>
    <div id="bannerAutoSave" style="display: none; background: #1a2a3a; padding: 20px; border-radius: 20px; margin-bottom: 20px;">
        <p style="font-size: 18px;">📦 Partido guardado detectado</p>
        <button class="btn btn-exito" onclick="recuperarPartido()">RECUPERAR</button>
        <button class="btn btn-peligro" onclick="reiniciarTodo()">NUEVO</button>
    </div>
    <input type="text" id="nombreRival" placeholder="Nombre del rival" value="RIVAL" onchange="actualizarNombresEquipos()">
    <div style="display: flex; gap: 10px; margin: 20px 0;">
        <button class="btn" id="btnLocal" style="flex: 1; background: #3498db;" onclick="cambiarRol('L')">GELVES LOCAL</button>
        <button class="btn btn-neutral" id="btnVisitante" style="flex: 1;" onclick="cambiarRol('V')">GELVES VISITANTE</button>
    </div>
    <button class="btn btn-primario" onclick="irAConvocatoria()">➡️ CONTINUAR</button>
</div>

<!-- Pantalla Convocatoria -->
<div id="pConvocatoria" class="pantalla">
    <h3>📋 CONVOCATORIA (edita dorsales y nombres)</h3>
    <div id="listaConvocatoria" style="flex: 1; overflow-y: auto; margin-bottom: 15px;"></div>
    <button class="btn btn-primario" onclick="irAOnce()">➡️ SELECCIONAR 11</button>
</div>

<!-- Pantalla Once -->
<div id="pOnce" class="pantalla">
    <h3 id="tituloOnce">⚡ SELECCIONA 11 (0)</h3>
    <div id="listaOnce" class="once-container" style="flex: 1; overflow-y: auto; margin-bottom: 15px;"></div>
    <button class="btn btn-exito" id="btnIniciar" onclick="iniciarPartido()" disabled>⚽ INICIAR PARTIDO</button>
</div>

<!-- Pantalla Partido -->
<div id="pPartido" class="pantalla">
    <div class="marcador-box">
        <div id="textoFase" style="color: #888; margin-bottom: 5px;">⏳ PREPARTIDO</div>
        <div class="nombres-marcador">
            <span id="nombreLocal">GELVES</span>
            <span id="nombreVisitante">RIVAL</span>
        </div>
        <div class="marcador">
            <span id="golesLocal">0</span> - <span id="golesVisitante">0</span>
        </div>
        <div class="timer" id="reloj">00:00</div>
        <div id="infoExtra"></div>
    </div>

    <button id="btnFase" class="btn btn-exito" onclick="siguienteFase()">▶️ INICIAR 1ª PARTE</button>

    <div class="timeline-container">
        <div class="timeline-header">
            <span>📋 TIMELINE</span>
            <div class="filtro-cambios">
                <span style="font-size: 14px;">🔄 Cambios</span>
                <label class="switch">
                    <input type="checkbox" id="filtroCambios" checked onchange="toggleCambios()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <div class="timeline-scroll">
            <div id="timelineLocal" class="col"></div>
            <div id="timelineVisitante" class="col"></div>
        </div>
    </div>

    <div class="grid-controles">
        <button class="btn btn-exito" onclick="mostrarGolGelves()">⚽ GOL GELVES</button>
        <button class="btn btn-peligro" onclick="golRival()">⚽ GOL RIVAL</button>
        <button class="btn" style="background: #9b59b6;" onclick="mostrarPenaltiFavor()">🎯 PENALTI FAVOR</button>
        <button class="btn" style="background: #c0392b;" onclick="mostrarPenaltiContra()">🎯 PENALTI CONTRA</button>
        <button class="btn" style="background: #f1c40f; color: black;" onclick="mostrarTarjetaGelves()">🟨 AMARILLA</button>
        <button class="btn" style="background: #7f8c8d;" onclick="mostrarTarjetaRival()">🟨 AMAR. RIVAL</button>
        <button class="btn" style="background: #e67e22;" onclick="mostrarOcasGelves()">🔥 OCASIÓN</button>
        <button class="btn" style="background: #2c3e50;" onclick="mostrarCambio()">🔄 CAMBIO</button>
        <button class="btn" style="background: #2ecc71;" onclick="mostrarCorner()">⚑ CÓRNER</button>
        <button class="btn" style="background: #34495e;" onclick="mostrarManual()">➕ ACCIÓN MANUAL</button>
    </div>
</div>

<!-- Pantalla Resumen -->
<div id="pResumen" class="pantalla">
    <div class="marcador-box">
        <h2>📋 ACTA FINAL</h2>
        <div class="nombres-marcador">
            <span id="resumenLocal">GELVES</span>
            <span id="resumenVisitante">RIVAL</span>
        </div>
        <div id="marcadorFinal" class="marcador">0 - 0</div>
    </div>
    <div class="timeline-container">
        <div class="timeline-scroll">
            <div id="resumenTimelineLocal" class="col"></div>
            <div id="resumenTimelineVisitante" class="col"></div>
        </div>
    </div>
    <div class="btn-group">
        <button class="btn btn-neutral" style="flex: 1;" onclick="volverAlPartido()">⬅️ VOLVER</button>
        <button class="btn btn-exito" style="flex: 1;" onclick="exportarCSV()">📥 DESCARGAR CSV</button>
    </div>
    <button class="btn btn-neutral" onclick="nuevoPartido()" style="margin-top: 10px;">🔄 NUEVO PARTIDO</button>
</div>

<script>
// ===== JUGADORES BASE =====
const PLANTILLA_BASE = [
    {d:1, n:"Alvaro"}, {d:2, n:"Jose"}, {d:3, n:"Antunez"}, {d:5, n:"Robert"}, {d:6, n:"David"}, 
    {d:8, n:"Jesus Ramos"}, {d:9, n:"Ortega"}, {d:10, n:"Marcos"}, {d:11, n:"Hugo"}, 
    {d:12, n:"Martin"}, {d:13, n:"Jesus"}, {d:14, n:"Alberto Lopez"}, {d:15, n:"Ramiro"}, 
    {d:16, n:"Isaac"}, {d:20, n:"Abraham"}, {d:21, n:"Samuel"}, {d:22, n:"Vargas"},
    {d:28, n:"Carlos"}, {d:30, n:"Guille"}, {d:41, n:"Saul"}, {d:42, n:"Juande"}, {d:25, n:"Aitor"},
    {d:0, n:"Filial 1"}, {d:0, n:"Filial 2"}, {d:0, n:"Filial 3"}, {d:0, n:"Filial 4"}
];

// ===== VARIABLES GLOBALES =====
let rolGelves = 'L';
let rolRival = 'V';
let convocados = [];
let enCampo = [];
let eventos = [];
let golesL = 0, golesV = 0;
let fase = 0; // 0:pre, 1:1parte, 2:descanso, 3:2parte, 4:final
let tiempoInicio = 0;
let intervaloReloj = null;
let duracion1T = "";
let minutoFinal = 90;
let mostrarCambios = true;
let minutoFin1T = 45; // Guarda el minuto real de finalización de la 1ª parte

// Iconos para eventos
const ICONOS = {
    'GOL': '⚽',
    'AMARILLA': '🟨',
    'ROJA': '🟥',
    'PENALTI': '🎯',
    'PENALTI CONTRA': '🎯',
    'OCASION': '🔥',
    'CAMBIO': '🔄',
    'CORNER': '⚑'
};

// Colores para la barra lateral
const COLORES_EVENTO = {
    'GOL': '#3498db',
    'AMARILLA': '#f1c40f',
    'ROJA': '#e74c3c',
    'PENALTI': '#9b59b6',
    'PENALTI CONTRA': '#9b59b6',
    'OCASION': '#e67e22',
    'CAMBIO': '#7f8c8d',
    'CORNER': '#2ecc71'
};

// ===== FUNCIONES DE NAVEGACIÓN =====
function mostrarPantalla(id) {
    document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

window.cambiarRol = function(rol) {
    rolGelves = rol;
    rolRival = rol === 'L' ? 'V' : 'L';
    document.getElementById('btnLocal').style.background = rol === 'L' ? '#3498db' : '#333';
    document.getElementById('btnVisitante').style.background = rol === 'V' ? '#3498db' : '#333';
    actualizarNombresEquipos();
};

window.irAConvocatoria = function() {
    let html = '<table>';
    PLANTILLA_BASE.forEach((j, i) => {
        html += `
            <tr>
                <td style="width: 50px;"><input type="checkbox" id="chk_${i}" checked style="transform: scale(1.3);"></td>
                <td style="width: 80px;"><input type="number" id="num_${i}" value="${j.d}" class="dorsal-input"></td>
                <td><input type="text" id="nom_${i}" value="${j.n}" class="nombre-input"></td>
            </tr>
        `;
    });
    html += '</table>';
    document.getElementById('listaConvocatoria').innerHTML = html;
    mostrarPantalla('pConvocatoria');
};

window.irAOnce = function() {
    convocados = [];
    for(let i = 0; i < PLANTILLA_BASE.length; i++) {
        if(document.getElementById(`chk_${i}`)?.checked) {
            let dorsal = document.getElementById(`num_${i}`)?.value || PLANTILLA_BASE[i].d;
            let nombre = document.getElementById(`nom_${i}`)?.value || PLANTILLA_BASE[i].n;
            
            convocados.push({
                num: dorsal,
                name: nombre,
                goles: 0,
                asistencias: 0,
                amarillas: 0,
                rojas: 0,
                intervalos: [],
                activo: false,
                entradaActual: null
            });
        }
    }
    
    let html = '';
    convocados.forEach((j, i) => {
        html += `
            <div class="once-item">
                <input type="checkbox" id="once_${i}" onchange="actualizarContadorOnce()">
                <span class="dorsal">${j.num}</span>
                <span>${j.name}</span>
            </div>
        `;
    });
    document.getElementById('listaOnce').innerHTML = html;
    mostrarPantalla('pOnce');
    actualizarContadorOnce();
};

window.actualizarContadorOnce = function() {
    let count = 0;
    for(let i = 0; i < convocados.length; i++) {
        if(document.getElementById(`once_${i}`)?.checked) count++;
    }
    document.getElementById('tituloOnce').innerHTML = `⚡ SELECCIONA 11 (${count})`;
    document.getElementById('btnIniciar').disabled = count === 0;
};

window.iniciarPartido = function() {
    enCampo = [];
    convocados.forEach(j => {
        j.goles = 0;
        j.asistencias = 0;
        j.amarillas = 0;
        j.rojas = 0;
        j.intervalos = [];
        j.activo = false;
        j.entradaActual = null;
    });
    
    for(let i = 0; i < convocados.length; i++) {
        if(document.getElementById(`once_${i}`)?.checked) {
            let j = convocados[i];
            j.activo = true;
            j.entradaActual = 0;
            enCampo.push(j);
        }
    }
    actualizarNombresEquipos();
    mostrarPantalla('pPartido');
    guardarAuto();
};

// ===== FUNCIONES DEL PARTIDO =====
function obtenerMinutoActual() {
    if(fase === 0) return 0;
    if(fase === 2) return minutoFin1T;
    let seg = Math.floor((Date.now() - tiempoInicio) / 1000);
    if(fase === 3) return 45 + Math.floor(seg / 60);
    if(fase === 4) return minutoFinal;
    return Math.floor(seg / 60);
}

function actualizarReloj() {
    if(fase === 4) return;
    
    let minutos = 0;
    let segundos = 0;
    
    if (fase === 1) {
        let seg = Math.floor((Date.now() - tiempoInicio) / 1000);
        minutos = Math.floor(seg / 60);
        segundos = seg % 60;
    } else if (fase === 3) {
        let seg = Math.floor((Date.now() - tiempoInicio) / 1000);
        minutos = 45 + Math.floor(seg / 60);
        segundos = seg % 60;
    } else {
        minutos = minutoFin1T;
        segundos = 0;
    }
    
    document.getElementById('reloj').innerText = 
        `${minutos.toString().padStart(2,'0')}:${segundos.toString().padStart(2,'0')}`;
}

window.siguienteFase = function() {
    const minActual = obtenerMinutoActual();
    
    if(fase === 0) {
        fase = 1;
        tiempoInicio = Date.now();
        intervaloReloj = setInterval(actualizarReloj, 500);
    } 
    else if(fase === 1) {
        minutoFin1T = minActual;
        
        convocados.forEach(j => {
            if(j.activo && j.entradaActual !== null) {
                let minutosJugados = minActual - j.entradaActual;
                j.intervalos.push({
                    inicio: j.entradaActual,
                    fin: minActual,
                    mins: minutosJugados
                });
            }
        });
        
        fase = 2;
        clearInterval(intervaloReloj);
        duracion1T = "1T: " + document.getElementById('reloj').innerText;
        document.getElementById('infoExtra').innerText = duracion1T;
        actualizarReloj();
    } 
    else if(fase === 2) {
        fase = 3;
        tiempoInicio = Date.now();
        
        convocados.forEach(j => {
            if(j.activo) {
                j.entradaActual = 45;
            }
        });
        
        enCampo = convocados.filter(j => j.activo);
        intervaloReloj = setInterval(actualizarReloj, 500);
    } 
    else if(fase === 3) {
        minutoFinal = minActual;
        convocados.forEach(j => {
            if(j.activo && j.entradaActual !== null) {
                let minutosJugados = minutoFinal - j.entradaActual;
                j.intervalos.push({
                    inicio: j.entradaActual,
                    fin: minutoFinal,
                    mins: minutosJugados
                });
                j.entradaActual = null;
                j.activo = false;
            }
        });
        enCampo = [];
        fase = 4;
        clearInterval(intervaloReloj);
        finalizarPartido();
        return;
    }
    actualizarBotonFase();
    guardarAuto();
};

function actualizarBotonFase() {
    const btn = document.getElementById('btnFase');
    const txt = document.getElementById('textoFase');
    if(fase === 1) {
        btn.innerText = "⏹️ FINALIZAR 1ª PARTE";
        txt.innerText = "⚽ 1ª PARTE";
    } else if(fase === 2) {
        btn.innerText = "▶️ INICIAR 2ª PARTE";
        txt.innerText = "⏸️ DESCANSO";
    } else if(fase === 3) {
        btn.innerText = "⏹️ FINALIZAR PARTIDO";
        txt.innerText = "⚽ 2ª PARTE";
    } else {
        btn.innerText = "▶️ INICIAR 1ª PARTE";
        txt.innerText = "⏳ PREPARTIDO";
    }
}

function actualizarNombresEquipos() {
    const rival = document.getElementById('nombreRival').value || "RIVAL";
    document.getElementById('nombreLocal').innerText = rolGelves === 'L' ? "GELVES" : rival;
    document.getElementById('nombreVisitante').innerText = rolGelves === 'V' ? "GELVES" : rival;
    document.getElementById('resumenLocal').innerText = rolGelves === 'L' ? "GELVES" : rival;
    document.getElementById('resumenVisitante').innerText = rolGelves === 'V' ? "GELVES" : rival;
}

window.toggleCambios = function() {
    mostrarCambios = document.getElementById('filtroCambios').checked;
    actualizarTimeline();
};

// ===== REGISTRO DE EVENTOS =====
function registrarEvento(tipo, equipo, jugador, extra = "", minManual = null) {
    let min = minManual !== null ? minManual : obtenerMinutoActual();
    let id = Date.now() + Math.random();
    eventos.push({ id, min, tipo, equipo, jugador, extra });
    actualizarMarcador();
    actualizarTimeline();
    guardarAuto();
    return id;
}

function actualizarMarcador() {
    golesL = eventos.filter(e => e.tipo === 'GOL' && e.equipo === 'L').length;
    golesV = eventos.filter(e => e.tipo === 'GOL' && e.equipo === 'V').length;
    document.getElementById('golesLocal').innerText = golesL;
    document.getElementById('golesVisitante').innerText = golesV;
}

function actualizarTimeline() {
    const tlLocal = document.getElementById('timelineLocal');
    const tlVisit = document.getElementById('timelineVisitante');
    tlLocal.innerHTML = '';
    tlVisit.innerHTML = '';
    
    [...eventos].sort((a,b) => a.min - b.min).forEach(e => {
        if(!mostrarCambios && e.tipo === 'CAMBIO') return;
        
        let icono = ICONOS[e.tipo] || '•';
        let color = COLORES_EVENTO[e.tipo] || '#3498db';
        let html = `
            <div class="evento" data-tipo="${e.tipo}" style="border-left-color: ${color};">
                <span><b>${e.min}'</b> ${icono} ${e.jugador} ${e.extra || ''}</span>
                <button class="btn-del" style="background: #e74c3c; border: none; color: white; border-radius: 50%; width: 30px; height: 30px; cursor: pointer;" onclick="borrarEvento(${e.id})">✕</button>
            </div>
        `;
        if(e.equipo === 'L') tlLocal.innerHTML += html;
        else tlVisit.innerHTML += html;
    });
}

window.borrarEvento = function(id) {
    let idx = eventos.findIndex(e => e.id === id);
    if(idx === -1) return;
    let e = eventos[idx];
    let jug = convocados.find(j => j.name === e.jugador);
    if(jug) {
        if(e.tipo === 'GOL') jug.goles--;
        if(e.tipo === 'AMARILLA') jug.amarillas--;
        if(e.tipo === 'ROJA') jug.rojas--;
    }
    eventos.splice(idx, 1);
    actualizarMarcador();
    actualizarTimeline();
    guardarAuto();
};

// ===== ACCIONES =====
window.mostrarGolGelves = function() {
    if(enCampo.length === 0) {
        alert('No hay jugadores en campo');
        return;
    }
    let modal = crearModal("⚽ GOLEADOR");
    let grid = document.createElement('div');
    grid.className = 'grid-jugadores';

                        inicio: j.entradaActual,
                        fin: minuto,
                        mins: minutosJugados
                    });
                    j.activo = false;
                    j.entradaActual = null;
                    
                    suplente.activo = true;
                    suplente.entradaActual = minuto;

                    guardarAuto();

function finalizarPartido() {
    document.getElementById('marcadorFinal').innerText = `${golesL} - ${golesV}`;
    
    const resLocal = document.getElementById('resumenTimelineLocal');
    const resVisit = document.getElementById('resumenTimelineVisitante');
    resLocal.innerHTML = '';
    resVisit.innerHTML = '';
    
    // SOLO mostrar GOLES, AMARILLAS y ROJAS en el acta final
    const tiposValidos = ['GOL', 'AMARILLA', 'ROJA'];
    
    [...eventos]
        .filter(e => tiposValidos.includes(e.tipo))
        .sort((a,b) => a.min - b.min)
        .forEach(e => {
            let icono = ICONOS[e.tipo] || '';
            let color = COLORES_EVENTO[e.tipo] || '#3498db';
            let html = `<div class="evento" data-tipo="${e.tipo}" style="border-left-color: ${color};"><span><b>${e.min}'</b> ${e.jugador}</span><span>${icono}</span></div>`;
            if(e.equipo === 'L') resLocal.innerHTML += html;
            else resVisit.innerHTML += html;
        });
    
    mostrarPantalla('pResumen');
}

// ===== AUTO GUARDADO =====
function guardarAuto() {
    const data = {
        rolGelves, rolRival,
        convocados: convocados.map(j => ({
            ...j,
            intervalos: [...j.intervalos]
        })),
        eventos, golesL, golesV, fase, tiempoInicio, duracion1T, minutoFinal, minutoFin1T,
        rival: document.getElementById('nombreRival').value
    };
    localStorage.setItem('partido_final', JSON.stringify(data));
    document.getElementById('bannerAutoSave').style.display = 'block';
}

window.recuperarPartido = function() {
    const data = JSON.parse(localStorage.getItem('partido_final'));
    if(!data) return;
    
    rolGelves = data.rolGelves;
    rolRival = data.rolRival;
    convocados = data.convocados.map(j => ({...j, intervalos: j.intervalos || []}));
    eventos = data.eventos;
    golesL = data.golesL;
    golesV = data.golesV;
    fase = data.fase;
    tiempoInicio = data.tiempoInicio;
    duracion1T = data.duracion1T || "";
    minutoFinal = data.minutoFinal || 90;
    minutoFin1T = data.minutoFin1T || 45;
    
    if(data.rival) document.getElementById('nombreRival').value = data.rival;
    
    enCampo = convocados.filter(j => j.activo);
    
    actualizarNombresEquipos();
    actualizarMarcador();
    actualizarTimeline();
    actualizarBotonFase();
    if(duracion1T) document.getElementById('infoExtra').innerText = duracion1T;
    
    if(fase === 1 || fase === 3) {
        if(intervaloReloj) clearInterval(intervaloReloj);
        intervaloReloj = setInterval(actualizarReloj, 500);
    }
    
    mostrarPantalla('pPartido');
    document.getElementById('bannerAutoSave').style.display = 'none';
};
// ===== EXPORTAR CSV =====
window.exportarCSV = function() {
    const rival = document.getElementById('nombreRival').value || "RIVAL";
    
    let nombreArchivo = '';
    if (rolGelves === 'L') {
        nombreArchivo = `Gelves_vs_${rival}.csv`;
    } else {
        nombreArchivo = `${rival}_vs_Gelves.csv`;
    }
    
    let csv = `PARTIDO: ${rolGelves === 'L' ? 'GELVES' : rival} vs ${rolGelves === 'V' ? 'GELVES' : rival}\n\n`;
    csv += "Dorsal;Jugador;Minutos Totales;Goles;Asistencias;Amarillas;Rojas;Periodos (inicio-fin minutos)\n";
    
    convocados.forEach(j => {
        let totalMins = j.intervalos.reduce((acc, i) => acc + (i.mins || 0), 0);
        let periodosTexto = j.intervalos.map(i => `${i.inicio}-${i.fin} (${i.mins} min)`).join(', ');
        csv += `${j.num};${j.name};${Math.round(totalMins)};${j.goles || 0};${j.asistencias || 0};${j.amarillas || 0};${j.rojas || 0};"${periodosTexto}"\n`;
    });
    
    // SECCIÓN DE CAMBIOS
    const cambios = eventos.filter(e => e.tipo === 'CAMBIO');
    if (cambios.length > 0) {
        csv += `\nCAMBIOS REALIZADOS\nMinuto;Sale;Entra\n`;
        cambios.sort((a,b) => a.min - b.min).forEach(e => {
            let sale = e.extra ? e.extra.replace('(sale ', '').replace(')', '') : '?';
            csv += `${e.min}';${sale};${e.jugador}\n`;
        });
    }
    
    // SECCIÓN DE CÓRNERS
    const cornersGelves = eventos.filter(e => e.tipo === 'CORNER' && e.equipo === rolGelves);
    const cornersRival = eventos.filter(e => e.tipo === 'CORNER' && e.equipo === rolRival);
    
    if (cornersGelves.length > 0 || cornersRival.length > 0) {
        csv += `\nCÓRNERS\n`;
        if (cornersGelves.length > 0) {
            csv += `A FAVOR (GELVES): ${cornersGelves.map(e => e.min + "'").join(', ')}\n`;
        }
        if (cornersRival.length > 0) {
            csv += `EN CONTRA (RIVAL): ${cornersRival.map(e => e.min + "'").join(', ')}\n`;
        }
    }
    
    // CRÓNICA COMPLETA (sin cambios ni corners)
    csv += `\nCRÓNICA COMPLETA\nMinuto;Equipo;Evento;Jugador;Detalle\n`;
    eventos
        .filter(e => e.tipo !== 'CAMBIO' && e.tipo !== 'CORNER')
        .sort((a,b) => a.min - b.min)
        .forEach(e => {
            let equipoTexto = e.equipo === rolGelves ? "GELVES" : "RIVAL";
            csv += `${e.min}';${equipoTexto};${e.tipo};${e.jugador};${e.extra || ''}\n`;
        });
    
    try {
        // Método 1: Descarga directa
        const blob = new Blob(['\uFEFF' + csv], {type: 'text/csv;charset=utf-8;'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = nombreArchivo;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        setTimeout(() => {
            alert('Si la descarga no comienza, usa el botón "Abrir en nueva pestaña"');
        }, 1000);
    } catch(e) {
        // Método 2: Abrir en nueva pestaña
        const win = window.open('', '_blank');
        win.document.write('<pre>' + csv + '</pre>');
        win.document.title = nombreArchivo;
    }
};
